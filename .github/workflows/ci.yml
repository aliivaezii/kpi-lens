name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install package + dev deps
        # Full install so mypy resolves sqlalchemy, pydantic-settings, and anthropic
        # types correctly. Without this, all three resolve to Any and produce
        # cascading [misc] / [no-any-return] false positives.
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check kpi_lens/

      - name: Ruff format check
        run: ruff format --check kpi_lens/

      - name: Mypy type check
        run: mypy kpi_lens/ --ignore-missing-imports

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run unit tests
        # No ANTHROPIC_API_KEY — mock_anthropic fixture handles all LLM calls
        run: pytest tests/unit/ -v --cov=kpi_lens --cov-report=xml --cov-fail-under=80

      - name: Run integration tests
        # --no-cov disables the addopts coverage threshold: integration tests only
        # cover the API layer (~28%), while unit tests own the 80% gate separately.
        run: pytest tests/integration/ -v --no-cov

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build Check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build API image
        run: docker build -f Dockerfile.api --target production -t kpi-lens-api:test .

      - name: Build Dashboard image
        run: docker build -f Dockerfile.dashboard --target production -t kpi-lens-dashboard:test .

      - name: Build MCP Server image
        run: docker build -f Dockerfile.mcp --target production -t kpi-lens-mcp:test .
