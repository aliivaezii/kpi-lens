version: 2
updates:
  # Python dependencies — weekly on Mondays
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      # Group all minor/patch updates for core ML/data libraries to reduce noise
      data-science:
        patterns:
          - pandas
          - scikit-learn
          - numpy
        update-types:
          - minor
          - patch

  # GitHub Actions — monthly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
