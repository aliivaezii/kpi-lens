name: Bug Report
description: Something is broken — help us fix it
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I call GET /api/kpis/snapshot the response is..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: "I expected the API to return..."
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - API (FastAPI)
        - Dashboard (Streamlit)
        - MCP Server
        - Ingestion pipeline
        - Anomaly detection
        - Reporting (Excel/PPT)
        - CI / build
        - Other
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.11.15"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or traceback
      render: shell
